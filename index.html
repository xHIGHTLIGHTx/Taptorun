<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tap To Run – Tales Runner</title>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: linear-gradient(160deg, #d4f0ff 0%, #e8fce8 50%, #fff9e0 100%);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: 'Press Start 2P', monospace, sans-serif;
      overflow: hidden;
    }

    /* ── header ── */
    #header {
      text-align: center;
      margin-bottom: 14px;
    }
    #header h1 {
      font-size: 28px;
      color: #e05010;
      text-shadow: 3px 3px 0 #ff9944, 6px 6px 0 rgba(0,0,0,0.15);
      letter-spacing: 2px;
      line-height: 1.3;
    }
    #header p {
      font-size: 10px;
      color: #558855;
      margin-top: 6px;
      text-shadow: 1px 1px 0 #fff;
      letter-spacing: 1px;
    }

    /* ── canvas wrapper ── */
    #wrap {
      position: relative;
      border: 4px solid #5a3010;
      border-radius: 4px;
      box-shadow:
        0 0 0 4px #c87830,
        0 0 0 8px #5a3010,
        8px 12px 30px rgba(0,0,0,0.3);
      image-rendering: pixelated;
    }
    canvas { display: block; image-rendering: pixelated; }

    /* ── footer ── */
    #footer {
      margin-top: 14px;
      font-size: 9px;
      color: #887755;
      text-align: center;
      line-height: 1.9;
    }

    /* ── error box ── */
    #err {
      display: none;
      color: #cc0000;
      font-size: 10px;
      margin-top: 10px;
      background: #ffe0e0;
      padding: 8px 14px;
      border: 2px solid #cc0000;
    }
  </style>
</head>
<body>

<div id="header">
  <h1>TAP TO RUN</h1>
  <p>&#9670; TALES RUNNER MINI GAME &#9670;</p>
</div>

<div id="wrap">
  <canvas id="game"></canvas>
</div>

<div id="footer">
  SPACE / CLICK / TAP &nbsp;&#9670;&nbsp; DOUBLE JUMP AVAILABLE
</div>
<div id="err"></div>

<script>
// ── error display ────────────────────────────────────────────────────────────
window.onerror = (msg,_,line) => {
  const e = document.getElementById('err');
  e.style.display = 'block';
  e.textContent = 'Error (line '+line+'): '+msg;
};

// ── canvas ───────────────────────────────────────────────────────────────────
const canvas = document.getElementById('game');
const ctx    = canvas.getContext('2d');
ctx.imageSmoothingEnabled = false;

const W = 780, H = 280;
canvas.width  = W;
canvas.height = H;

const GROUND = 218;   // pixel y of ground surface (adjust to match bg.png)

// ── pixel helpers ─────────────────────────────────────────────────────────────
function px(x, y, w, h, col) {
  ctx.fillStyle = col;
  ctx.fillRect(Math.round(x), Math.round(y), w, h);
}

// ── images ───────────────────────────────────────────────────────────────────
let bgSprite   = null;
let charSprite = null;
let bgScrollW  = W;   // will be updated after bgImg loads

const bgImg = new Image();
bgImg.onload = () => {
  const scale = H / bgImg.naturalHeight;
  bgScrollW   = Math.round(bgImg.naturalWidth * scale);
  bgSprite    = bgImg;
};
bgImg.onerror = () => { bgSprite = null; };
bgImg.src = 'bg.png';

const rawChar = new Image();
rawChar.crossOrigin = 'anonymous';
rawChar.onload = () => {
  try {
    const off = document.createElement('canvas');
    off.width  = rawChar.naturalWidth;
    off.height = rawChar.naturalHeight;
    const c = off.getContext('2d');
    c.drawImage(rawChar, 0, 0);
    const d = c.getImageData(0, 0, off.width, off.height);
    for (let i = 0; i < d.data.length; i += 4) {
      if (d.data[i]<50 && d.data[i+1]<50 && d.data[i+2]<50) d.data[i+3]=0;
    }
    c.putImageData(d, 0, 0);
    charSprite = off;
  } catch(e) { charSprite = null; }
};
rawChar.onerror = () => { charSprite = null; };
rawChar.src = 'character.png';

// ── audio ────────────────────────────────────────────────────────────────────
let AC;
function beep(f,d,t,v){
  try{
    if(!AC) AC=new(window.AudioContext||window.webkitAudioContext)();
    const o=AC.createOscillator(),g=AC.createGain();
    o.type=t||'square'; o.frequency.value=f;
    g.gain.setValueAtTime(v||.08,AC.currentTime);
    g.gain.exponentialRampToValueAtTime(.001,AC.currentTime+d);
    o.connect(g); g.connect(AC.destination);
    o.start(); o.stop(AC.currentTime+d);
  }catch(e){}
}
const sfxJ1  = () => beep(500,.1,'square',.07);
const sfxJ2  = () => beep(650,.1,'square',.05);
const sfxDie = () => { beep(300,.12,'sawtooth',.1); setTimeout(()=>beep(200,.3,'sawtooth',.08),100); };
const sfxCoin= () => { beep(900,.06,'square',.07); setTimeout(()=>beep(1200,.08,'square',.07),55); };

// ── obstacle drawing (pixel art) ──────────────────────────────────────────────
function drawStump(x, y) {
  // trunk
  px(x+4,  y-44, 22, 44, '#7a4020');
  px(x+10, y-40, 4,  36, '#5a2e10');
  px(x+16, y-40, 4,  36, '#5a2e10');
  // top bark
  px(x,    y-48, 30, 6,  '#9a5030');
  // leaves cap
  px(x-2,  y-68, 34, 22, '#2d8830');
  px(x+2,  y-76, 26, 12, '#3aaa3a');
  px(x+6,  y-80, 18, 6,  '#4ac04a');
}

function drawRock(x, y) {
  px(x+6,  y-36, 22, 6,  '#aaaaaa');
  px(x+2,  y-30, 30, 8,  '#999999');
  px(x,    y-22, 34, 14, '#888888');
  px(x+2,  y-8,  30, 8,  '#777777');
  px(x+6,  y-32, 10, 6,  '#cccccc'); // shine
}

function drawFence(x, y) {
  // posts
  px(x,    y-52, 8, 52, '#a06030');
  px(x+22, y-52, 8, 52, '#a06030');
  px(x+44, y-52, 8, 52, '#a06030');
  // rails
  px(x-2,  y-44, 56, 8, '#c07840');
  px(x-2,  y-24, 56, 8, '#c07840');
  // shading
  px(x+2,  y-50, 4, 48, '#804820');
  px(x+24, y-50, 4, 48, '#804820');
  px(x+46, y-50, 4, 48, '#804820');
}

function drawMushroom(x, y) {
  // stem
  px(x+8,  y-24, 14, 24, '#e8dbc8');
  px(x+12, y-22, 6,  20, '#f0e8d8');
  // cap
  px(x+2,  y-44, 26, 22, '#dd2222');
  px(x,    y-36, 30, 14, '#cc1111');
  // dots
  px(x+6,  y-40, 6,  6,  '#ffcccc');
  px(x+18, y-38, 6,  6,  '#ffcccc');
  px(x+10, y-30, 4,  4,  '#ffcccc');
}

// ── obstacle types ─────────────────────────────────────────────────────────────
const OBS_TYPES = ['stump','rock','fence','mushroom','stump2','rock2'];

function drawObstacle(o) {
  switch(o.type) {
    case 'stump':    drawStump(o.x, o.y); break;
    case 'stump2':   ctx.save(); ctx.scale(1.25,1.25); ctx.translate(-o.x*0.2,-o.y*0.2); drawStump(o.x, o.y); ctx.restore(); break;
    case 'rock':     drawRock(o.x, o.y); break;
    case 'rock2':    ctx.save(); ctx.scale(1.3,1.3); ctx.translate(-o.x*0.23,-o.y*0.23); drawRock(o.x,o.y); ctx.restore(); break;
    case 'fence':    drawFence(o.x, o.y); break;
    case 'mushroom': drawMushroom(o.x, o.y); break;
  }
}

// ── particles ──────────────────────────────────────────────────────────────────
let dusts = [], stars = [];
function spawnDust(x) {
  for (let i=0;i<3;i++) dusts.push({x:x+Math.random()*14,y:GROUND,vx:-Math.random()*2,vy:-Math.random()-0.4,life:1,r:3+Math.random()*3});
}
function spawnStars(x,y) {
  for (let i=0;i<14;i++) {
    const a=(i/14)*Math.PI*2, sp=3+Math.random()*4;
    stars.push({x,y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp-2,life:1,r:3+Math.random()*4,col:`hsl(${Math.random()*60+20},100%,60%)`});
  }
}

// ── difficulty config ──────────────────────────────────────────────────────────
// score = raw tick count. display score = score/10
// Each PHASE lasts until displayScore reaches 'until'
const PHASES = [
  { until:  200, speed: 2.4, gap: 155, single: true,  label: 'EASY',   col: '#44aa44' },
  { until:  500, speed: 3.0, gap: 130, single: true,  label: 'EASY',   col: '#44aa44' },
  { until: 1000, speed: 3.8, gap: 108, single: false, label: 'NORMAL', col: '#ddaa00' },
  { until: 1800, speed: 4.6, gap:  90, single: false, label: 'NORMAL', col: '#ddaa00' },
  { until: 2800, speed: 5.5, gap:  76, single: false, label: 'HARD',   col: '#ee6622' },
  { until: 4000, speed: 6.5, gap:  65, single: false, label: 'HARD',   col: '#ee6622' },
  { until: 9999, speed: 7.8, gap:  54, single: false, label: 'INSANE', col: '#cc2222' },
];

function getPhase(displayScore) {
  for (const p of PHASES) if (displayScore < p.until) return p;
  return PHASES[PHASES.length - 1];
}

// ── state ──────────────────────────────────────────────────────────────────────
let state    = 'waiting';
let score    = 0;
let hiScore  = parseInt(localStorage.getItem('tapRunHi')||'0',10);
let speed    = 2.4;
let tick     = 0;
let bgX      = 0;
let groundX  = 0;
let flashAlp = 0;
let curPhase = PHASES[0];

// ── character ─────────────────────────────────────────────────────────────────
const JUMP_V = -13;
const GRAV   = 0.58;
const char   = { x:100, y:GROUND, w:70, h:94, vy:0, jumps:0, maxJ:2, bob:0, dead:false };

// ── obstacles ─────────────────────────────────────────────────────────────────
let obstacles = [];
let obstTimer = 0;
let obstGap   = 155;

function randType() { return OBS_TYPES[Math.floor(Math.random()*OBS_TYPES.length)]; }

function spawnObs() {
  const phase = curPhase;
  const r = Math.random();
  if (phase.single || r < 0.55) {
    // single obstacle
    obstacles.push({ x:W+20, y:GROUND, w:30, h:80, type:randType() });
  } else if (r < 0.82) {
    // double
    obstacles.push({ x:W+20, y:GROUND, w:30, h:60, type:randType() });
    obstacles.push({ x:W+68, y:GROUND, w:30, h:60, type:randType() });
  } else {
    // triple (hard+ only)
    obstacles.push({ x:W+20, y:GROUND, w:30, h:55, type:randType() });
    obstacles.push({ x:W+62, y:GROUND, w:30, h:62, type:randType() });
    obstacles.push({ x:W+104,y:GROUND, w:30, h:50, type:randType() });
  }
}

// ── input ─────────────────────────────────────────────────────────────────────
function onAct() {
  if (state==='waiting')  { state='playing'; try{if(AC)AC.resume();}catch(e){} return; }
  if (state==='gameover') { doReset(); try{if(AC)AC.resume();}catch(e){} return; }
  if (char.jumps < char.maxJ) {
    char.vy = JUMP_V * (char.jumps===1 ? 0.82 : 1);
    char.jumps++;
    char.jumps===1 ? sfxJ1() : sfxJ2();
  }
}
document.addEventListener('keydown', e => { if(e.code==='Space'||e.code==='ArrowUp'){e.preventDefault();onAct();} });
canvas.addEventListener('pointerdown', e => { e.preventDefault(); onAct(); });

// ── reset ──────────────────────────────────────────────────────────────────────
function doReset() {
  score=0; tick=0; flashAlp=0;
  curPhase = PHASES[0];
  speed    = curPhase.speed;
  obstGap  = curPhase.gap;
  obstacles=[]; obstTimer=0;
  dusts=[]; stars=[];
  char.y=GROUND; char.vy=0; char.jumps=0; char.dead=false;
  state='playing';
}

// ── update ─────────────────────────────────────────────────────────────────────
function update() {
  if (state!=='playing') return;
  tick++; score++;

  // smooth difficulty from phase table
  const ds = Math.floor(score/10);
  const newPhase = getPhase(ds);
  if (newPhase !== curPhase) {
    curPhase = newPhase;
    sfxCoin();
  }
  // lerp speed & gap smoothly toward target
  speed   += (curPhase.speed - speed) * 0.015;
  obstGap += (curPhase.gap   - obstGap) * 0.015;

  if (score%1000===0 && score>0 && newPhase===curPhase) sfxCoin();

  // bg scroll
  bgX = (bgX - speed*0.6) % bgScrollW;
  groundX = (groundX - speed) % 48;

  // spawn obstacles
  if (++obstTimer >= obstGap) { spawnObs(); obstTimer=0; }
  obstacles = obstacles.filter(o=>o.x+o.w>-10);
  for (const o of obstacles) o.x -= speed;

  // physics
  char.vy += GRAV;
  char.y = Math.min(char.y + char.vy, GROUND);
  if (char.y >= GROUND) { char.vy=0; char.jumps=0; }
  char.bob = char.y===GROUND ? Math.sin(tick*0.22)*3 : 0;

  // dust
  if (char.y===GROUND && tick%7===0) spawnDust(char.x+char.w*0.15);
  for (const d of dusts) { d.x+=d.vx; d.y+=d.vy; d.vy+=0.1; d.life-=0.07; }
  dusts = dusts.filter(d=>d.life>0);
  for (const s of stars) { s.x+=s.vx; s.y+=s.vy; s.vy+=0.15; s.life-=0.025; }
  stars = stars.filter(s=>s.life>0);

  if (flashAlp>0) flashAlp-=0.04;

  // collision
  const hx=char.x+14, hy=char.y-char.h+16, hw=char.w-28, hh=char.h-22;
  for (const o of obstacles) {
    const oh=80, oy=o.y-oh;
    if (hx<o.x+o.w && hx+hw>o.x && hy<o.y && hy+hh>oy) {
      state='gameover'; char.dead=true; flashAlp=1;
      if (score>hiScore) { hiScore=score; localStorage.setItem('tapRunHi',hiScore); }
      spawnStars(hx+hw/2, hy+hh/2);
      sfxDie();
      return;
    }
  }
}

// ── draw ───────────────────────────────────────────────────────────────────────
function draw() {
  ctx.imageSmoothingEnabled = false;

  // ── background ──
  if (bgSprite && bgScrollW > 0) {
    const x0 = ((bgX % bgScrollW) + bgScrollW) % bgScrollW;
    ctx.drawImage(bgSprite, x0 - bgScrollW, 0, bgScrollW, H);
    ctx.drawImage(bgSprite, x0,             0, bgScrollW, H);
    if (x0 + bgScrollW < W) ctx.drawImage(bgSprite, x0 + bgScrollW, 0, bgScrollW, H);
  } else {
    // fallback sky
    const sky = ctx.createLinearGradient(0,0,0,H);
    sky.addColorStop(0,'#6ec6ff');
    sky.addColorStop(1,'#b0e890');
    ctx.fillStyle=sky; ctx.fillRect(0,0,W,H);
  }

  // ── semi-transparent ground strip ──
  ctx.fillStyle='rgba(60,120,20,0.18)';
  ctx.fillRect(0, GROUND, W, H-GROUND);

  // ── ground line with grass dots ──
  ctx.fillStyle='rgba(40,120,20,0.55)';
  for (let x=(groundX%48); x<W; x+=48) {
    px(x,   GROUND,   6, 4, 'rgba(60,160,30,0.7)');
    px(x+16,GROUND,   4, 3, 'rgba(80,180,40,0.5)');
    px(x+30,GROUND+2, 4, 2, 'rgba(60,140,20,0.4)');
  }

  // ── dust ──
  for (const d of dusts) {
    ctx.globalAlpha=d.life*0.5;
    ctx.fillStyle='#b8e890';
    ctx.fillRect(Math.round(d.x),Math.round(d.y),Math.round(d.r*d.life),Math.round(d.r*d.life));
  }
  ctx.globalAlpha=1;

  // ── obstacles ──
  ctx.imageSmoothingEnabled=false;
  for (const o of obstacles) drawObstacle(o);

  // ── stars burst ──
  for (const s of stars) {
    ctx.globalAlpha=s.life;
    ctx.fillStyle=s.col;
    const sz=Math.round(s.r*s.life);
    ctx.fillRect(Math.round(s.x),Math.round(s.y),sz,sz);
  }
  ctx.globalAlpha=1;

  // ── character ──
  const bobY = char.y===GROUND ? char.bob : 0;
  const lean = char.y<GROUND ? -7 : 0;
  ctx.save();
  if (char.dead) { ctx.globalAlpha=0.6; ctx.filter='grayscale(1) brightness(0.8)'; }
  ctx.translate(char.x+char.w/2, char.y-char.h/2+bobY);
  ctx.rotate(lean*Math.PI/180);
  if (charSprite) {
    ctx.drawImage(charSprite,-char.w/2,-char.h/2,char.w,char.h);
  } else {
    // fallback pixel character
    px(-14,-52,28,28,'#ff5522');  // body
    px(-12,-72,24,22,'#ffcc88');  // face
    px(-16,-78,32,10,'#cc2200');  // hat
    px(-8, -84,16,8, '#ee3311');
    px(-4, -88,8, 6, '#ff4422');
    px(-6, -58,12,6, '#ffd700');  // star
  }
  ctx.restore();

  // ── HUD ──
  ctx.save();
  ctx.imageSmoothingEnabled=false;
  // score bg
  ctx.fillStyle='rgba(255,255,255,0.75)';
  ctx.fillRect(W-170,8,162,46);
  ctx.strokeStyle='#5a3010';
  ctx.lineWidth=3;
  ctx.strokeRect(W-170,8,162,46);

  ctx.font='10px "Press Start 2P", monospace';
  ctx.textAlign='right';
  ctx.fillStyle='#e05010';
  ctx.fillText('SCORE',W-16,28);
  ctx.fillStyle='#222';
  ctx.fillText(String(Math.floor(score/10)).padStart(6,'0'),W-16,45);

  // hi
  ctx.fillStyle='rgba(255,255,255,0.65)';
  ctx.fillRect(W-170,58,162,30);
  ctx.strokeStyle='#5a3010';
  ctx.lineWidth=2;
  ctx.strokeRect(W-170,58,162,30);
  ctx.font='8px "Press Start 2P", monospace';
  ctx.fillStyle='#558855';
  ctx.fillText('BEST  '+String(Math.floor(hiScore/10)).padStart(6,'0'),W-16,78);

  // difficulty badge
  ctx.textAlign='left';
  ctx.fillStyle='rgba(255,255,255,0.88)';
  ctx.fillRect(8,8,110,32);
  ctx.strokeStyle='#5a3010'; ctx.lineWidth=2;
  ctx.strokeRect(8,8,110,32);
  ctx.font='7px "Press Start 2P", monospace';
  ctx.fillStyle='#555';
  ctx.fillText('LEVEL',14,22);
  ctx.font='9px "Press Start 2P", monospace';
  ctx.fillStyle = state==='playing' ? curPhase.col : '#888';
  ctx.fillText(state==='playing' ? curPhase.label : '---', 14, 36);

  ctx.restore();

  // ── waiting overlay ──
  if (state==='waiting') {
    ctx.fillStyle='rgba(255,255,255,0.45)';
    ctx.fillRect(0,0,W,H);

    // title box
    ctx.fillStyle='rgba(255,255,255,0.92)';
    const bw=480,bh=160,bx=W/2-240,by=H/2-80;
    ctx.fillRect(bx,by,bw,bh);
    ctx.strokeStyle='#5a3010'; ctx.lineWidth=4;
    ctx.strokeRect(bx,by,bw,bh);
    ctx.strokeStyle='#c87830'; ctx.lineWidth=2;
    ctx.strokeRect(bx+4,by+4,bw-8,bh-8);

    ctx.textAlign='center';
    ctx.font='24px "Press Start 2P", monospace';
    ctx.fillStyle='#e05010';
    ctx.shadowColor='#ff9944'; ctx.shadowBlur=0;
    ctx.fillText('TAP TO RUN', W/2, by+48);

    ctx.font='8px "Press Start 2P", monospace';
    ctx.fillStyle='#558855';
    ctx.fillText('TALES RUNNER MINI GAME', W/2, by+70);

    const pulse = 0.5+0.5*Math.sin(tick*0.08);
    ctx.globalAlpha=0.5+pulse*0.5;
    ctx.font='10px "Press Start 2P", monospace';
    ctx.fillStyle='#334488';
    ctx.fillText('PRESS SPACE / CLICK / TAP', W/2, by+106);
    ctx.globalAlpha=0.6;
    ctx.font='8px "Press Start 2P", monospace';
    ctx.fillStyle='#666';
    ctx.fillText('DOUBLE JUMP OK  |  AVOID OBSTACLES', W/2, by+128);
    ctx.globalAlpha=1;
  }

  // ── game over overlay ──
  if (state==='gameover') {
    if (flashAlp>0) {
      ctx.fillStyle=`rgba(255,80,0,${flashAlp*0.25})`;
      ctx.fillRect(0,0,W,H);
    }

    const bw=380,bh=170,bx=W/2-190,by=H/2-85;
    ctx.fillStyle='rgba(255,250,220,0.95)';
    ctx.fillRect(bx,by,bw,bh);
    ctx.strokeStyle='#cc3300'; ctx.lineWidth=4;
    ctx.strokeRect(bx,by,bw,bh);
    ctx.strokeStyle='#ff6644'; ctx.lineWidth=2;
    ctx.strokeRect(bx+4,by+4,bw-8,bh-8);

    ctx.textAlign='center';
    ctx.font='20px "Press Start 2P", monospace';
    ctx.fillStyle='#cc3300';
    ctx.fillText('GAME OVER', W/2, by+40);

    ctx.font='10px "Press Start 2P", monospace';
    ctx.fillStyle='#333';
    ctx.fillText('SCORE  '+Math.floor(score/10), W/2, by+72);

    if (score>=hiScore && score>0) {
      ctx.fillStyle='#cc6600';
      ctx.fillText('NEW RECORD!', W/2, by+98);
    }

    const p2=0.45+0.55*Math.sin(tick*0.1);
    ctx.globalAlpha=p2;
    ctx.font='8px "Press Start 2P", monospace';
    ctx.fillStyle='#334488';
    ctx.fillText('PRESS SPACE / CLICK TO RETRY', W/2, by+136);
    ctx.globalAlpha=1;
  }
}

// ── loop ───────────────────────────────────────────────────────────────────────
function loop() {
  update();
  ctx.clearRect(0,0,W,H);
  draw();
  requestAnimationFrame(loop);
}

char.y = GROUND;
loop();
</script>
</body>
</html>
